<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robot Mower Yard Zone Editor</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="vendor/leaflet-draw/leaflet.draw.css" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f4f6f5;
        color: #17201b;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 390px;
        height: 100vh;
      }

      body.readonly main {
        display: block;
      }

      #map {
        min-height: 100vh;
        height: 100vh;
        width: 100%;
      }

      body.readonly #map {
        min-height: 100vh;
        height: 100vh;
      }

      .live-status {
        display: none;
      }

      body.readonly .live-status {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 900;
        display: block;
        max-width: min(420px, calc(100vw - 24px));
        overflow: hidden;
        border: 1px solid rgb(23 32 27 / 16%);
        border-radius: 6px;
        background: rgb(255 255 255 / 88%);
        color: #17201b;
        box-shadow: 0 6px 20px rgb(23 32 27 / 16%);
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .leaflet-container {
        height: 100%;
        width: 100%;
      }

      .heatmap-canvas {
        pointer-events: none;
      }

      .leaflet-tile,
      .leaflet-marker-icon,
      .leaflet-marker-shadow {
        max-width: none;
        max-height: none;
      }

      .leaflet-draw-toolbar a {
        position: relative;
      }

      .leaflet-draw-toolbar a::after {
        position: absolute;
        left: 34px;
        top: 3px;
        display: none;
        min-width: 78px;
        padding: 4px 7px;
        border-radius: 5px;
        background: #17201b;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        pointer-events: none;
        z-index: 1000;
      }

      .leaflet-draw-toolbar a:hover::after,
      .leaflet-draw-toolbar a:focus::after {
        display: block;
      }

      .leaflet-draw-draw-polygon::after {
        content: "Polygon";
      }

      .leaflet-draw-draw-rectangle::after {
        content: "Rectangle";
      }

      .leaflet-draw-draw-circle::after {
        content: "Circle";
      }

      .leaflet-draw-edit-edit::after {
        content: "Edit";
      }

      .leaflet-draw-edit-remove::after {
        content: "Delete";
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: auto;
        padding: 18px;
        border-left: 1px solid #d6ded8;
        background: #ffffff;
      }

      body.readonly aside {
        display: none;
      }

      .save-bar {
        position: sticky;
        top: -18px;
        z-index: 500;
        display: grid;
        gap: 8px;
        padding: 12px 0;
        background: #ffffff;
        border-bottom: 1px solid #e3ebe5;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.25;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      textarea,
      button {
        width: 100%;
        border: 1px solid #c8d2cc;
        border-radius: 6px;
        font: inherit;
      }

      input,
      textarea {
        padding: 9px 10px;
        background: #fff;
        color: #17201b;
      }

      textarea {
        min-height: 230px;
        resize: vertical;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      button {
        cursor: pointer;
        padding: 10px 12px;
        background: #256d4d;
        color: white;
        font-weight: 700;
      }

      button.secondary {
        background: #eef4f0;
        color: #203429;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .muted {
        margin: 0;
        color: #52635a;
        font-size: 13px;
        line-height: 1.45;
      }

      .zone-list {
        display: grid;
        gap: 8px;
      }

      .zone-item {
        display: grid;
        gap: 6px;
        padding: 10px;
        border: 1px solid #d8e1db;
        border-radius: 6px;
        background: #f8faf9;
      }

      .mower-marker {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        background: #256d4d;
        box-shadow: 0 2px 8px rgb(0 0 0 / 35%);
        color: #ffffff;
      }

      .mower-marker.problem {
        background: #b42318;
      }

      .base-station-marker {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        background: #1f4f7a;
        box-shadow: 0 2px 8px rgb(0 0 0 / 35%);
        color: #ffffff;
      }

      .base-station-marker svg {
        width: 19px;
        height: 19px;
        display: block;
      }

      .mower-marker svg {
        width: 25px;
        height: 25px;
        display: block;
      }

      .leaflet-tooltip.mower-label {
        border: 1px solid rgb(23 32 27 / 16%);
        border-radius: 999px;
        background: rgb(255 255 255 / 92%);
        color: #17201b;
        box-shadow: 0 2px 8px rgb(0 0 0 / 22%);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.1;
        padding: 4px 8px;
        pointer-events: none;
        white-space: nowrap;
      }

      .leaflet-tooltip.mower-label::before {
        display: none;
      }

      .heat-sample {
        width: 22px;
        height: 22px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow: 0 1px 6px rgb(0 0 0 / 28%);
      }

      .heat-sample.ok {
        background: rgb(30 180 92 / 62%);
      }

      .heat-sample.problem {
        background: rgb(235 38 38 / 68%);
      }

      .leaflet-tooltip.zone-label {
        display: block;
        max-width: 180px;
        padding: 4px 9px;
        border: 2px solid rgb(17 17 17 / 72%);
        border-radius: 999px;
        background: rgb(255 255 255 / 94%);
        box-shadow:
          0 1px 4px rgb(0 0 0 / 45%),
          0 0 0 2px rgb(255 255 255 / 62%);
        color: #111111;
        font-size: var(--zone-label-size, 12px);
        font-weight: 800;
        line-height: 1.2;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .leaflet-tooltip.zone-label::before {
        display: none;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
          height: auto;
        }

        #map {
          min-height: 62vh;
          height: 62vh;
        }

        aside {
          border-left: 0;
          border-top: 1px solid #d6ded8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="map"></div>
      <div id="live-status" class="live-status"></div>
      <aside>
        <div>
          <h1>Robot Mower Yard Zone Editor</h1>
          <p class="muted" id="intro">
            Draw rectangles, circles, or polygons. Rename each zone, then paste
            the JSON into Robot Mower Yard's setup screen.
          </p>
        </div>

        <div class="row">
          <label>
            Latitude
            <input id="lat" inputmode="decimal" placeholder="44.000000" />
          </label>
          <label>
            Longitude
            <input id="lon" inputmode="decimal" placeholder="-93.000000" />
          </label>
        </div>
        <div class="save-bar">
          <button id="save">Save Zones to Home Assistant</button>
          <p class="muted" id="status"></p>
        </div>

        <button id="go">Center Map</button>
        <button id="fit" class="secondary">Fit Yard Map</button>

        <div class="zone-list" id="zone-list"></div>

        <label>
          Zones JSON
          <textarea id="json" spellcheck="false"></textarea>
        </label>
        <button id="copy">Copy JSON</button>
      </aside>
    </main>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/leaflet-draw/leaflet.draw.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const yardEntryId = params.get("yard_entry_id") || "";
      const startLat = Number(params.get("lat")) || 44.0;
      const startLon = Number(params.get("lon")) || -93.0;
      const latInput = document.querySelector("#lat");
      const lonInput = document.querySelector("#lon");
      const jsonOutput = document.querySelector("#json");
      const zoneList = document.querySelector("#zone-list");
      const statusText = document.querySelector("#status");
      const liveStatusText = document.querySelector("#live-status");
      const saveButton = document.querySelector("#save");
      const drawnItems = new L.FeatureGroup();
      const mowerMarkers = new L.FeatureGroup();
      const baseStationMarkers = new L.FeatureGroup();
      const zoneLabels = new L.FeatureGroup();
      const heatmapLayer = signedEvidenceHeatmapLayer();
      const mowerMarkerById = new Map();
      const baseStationMarkerById = new Map();
      const isHomeAssistantPanel = params.get("ha") === "1";
      const isReadonly = params.get("readonly") === "1";
      const mapMode = params.get("mode") || "zones";
      const liveRefreshMs = Math.max(1000, Number(params.get("refresh_ms")) || 3000);
      let heatmapBounds = null;
      let zoneCounter = 1;
      let isLoading = false;
      let dirty = false;
      let hasAutoFit = false;
      let liveRefreshTimer = null;
      let isRefreshingHomeAssistantState = false;

      if (isReadonly) {
        document.body.classList.add("readonly");
      }

      latInput.value = startLat.toFixed(7);
      lonInput.value = startLon.toFixed(7);

      const map = L.map("map", {
        center: [startLat, startLon],
        zoom: 19,
        zoomControl: true,
      });

      setTimeout(() => map.invalidateSize(), 0);

      const streetLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 22,
        maxNativeZoom: 19,
        attribution: "&copy; OpenStreetMap contributors",
      });

      const satelliteLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          maxZoom: 22,
          maxNativeZoom: 19,
          attribution:
            "Tiles &copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community",
        },
      );

      satelliteLayer.addTo(map);

      L.control
        .layers(
          {
            Satellite: satelliteLayer,
            Streets: streetLayer,
          },
          {},
          { position: "topright" },
        )
        .addTo(map);

      drawnItems.addTo(map);
      zoneLabels.addTo(map);
      if (mapMode === "heatmap") {
        heatmapLayer.addTo(map);
      }
      baseStationMarkers.addTo(map);
      mowerMarkers.addTo(map);

      if (!isReadonly) {
        map.addControl(
          new L.Control.Draw({
            draw: {
              marker: false,
              circlemarker: false,
              polyline: false,
              rectangle: { shapeOptions: zoneStyle() },
              polygon: {
                allowIntersection: false,
                showArea: true,
                shapeOptions: zoneStyle(),
              },
              circle: { shapeOptions: zoneStyle() },
            },
            edit: {
              featureGroup: drawnItems,
            },
          }),
        );
      }

      map.on(L.Draw.Event.CREATED, (event) => {
        const layer = event.layer;
        layer.zoneName = `Zone ${zoneCounter++}`;
        drawnItems.addLayer(layer);
        markDirty();
        refresh();
      });

      map.on(L.Draw.Event.EDITED, () => {
        markDirty();
        refresh();
      });
      map.on(L.Draw.Event.DELETED, () => {
        markDirty();
        refresh();
      });
      map.on("zoomend", updateZoneLabelSizes);

      if (isHomeAssistantPanel || isReadonly) {
        document.querySelector("#intro").textContent =
          "Draw or edit yard zones, then save them directly to this integration.";
        document.querySelector("#copy").textContent = "Copy JSON Backup";
        loadHomeAssistantState({ updateZones: true, fit: true });
        if (isReadonly) {
          liveRefreshTimer = window.setInterval(() => {
            loadHomeAssistantState({ updateZones: false, fit: false });
          }, liveRefreshMs);
        }
      } else {
        saveButton.hidden = true;
        loadMowerLocation();
      }

      window.addEventListener("pagehide", () => {
        if (liveRefreshTimer) {
          window.clearInterval(liveRefreshTimer);
          liveRefreshTimer = null;
        }
      });

      document.querySelector("#go").addEventListener("click", () => {
        const lat = Number(latInput.value);
        const lon = Number(lonInput.value);
        if (Number.isFinite(lat) && Number.isFinite(lon)) {
          map.setView([lat, lon], 19);
        }
      });

      document.querySelector("#fit").addEventListener("click", () => {
        fitMapToVisibleData();
      });

      document.querySelector("#copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(jsonOutput.value);
        setStatus("Copied JSON.");
      });

      saveButton.addEventListener("click", async () => {
        await saveZonesToHomeAssistant();
      });

      function refresh() {
        renderZoneList();
        jsonOutput.value = JSON.stringify(buildZones(), null, 2);
      }

      async function loadHomeAssistantState({ updateZones = true, fit = false } = {}) {
        if (isRefreshingHomeAssistantState) {
          return;
        }
        isRefreshingHomeAssistantState = true;
        try {
          const response = await fetch(zonesApiUrl({ cacheBust: isReadonly }), {
            cache: "no-store",
            credentials: "same-origin",
            headers: authHeaders(),
          });
          if (!response.ok) {
            throw new Error(`Load failed: ${response.status}`);
          }
          const payload = await response.json();
          if (updateZones) {
            if (mapMode === "heatmap" && isReadonly) {
              drawnItems.clearLayers();
              zoneLabels.clearLayers();
            } else {
              loadZones(payload.zones || []);
            }
          }
          if (mapMode === "heatmap") {
            setHeatmapMarkers(payload.heatmap_samples || []);
          }
          const mowers = (payload.mowers || []).filter((mower) =>
            Number.isFinite(Number(mower.latitude)) &&
            Number.isFinite(Number(mower.longitude)),
          );
          const baseStations = (payload.base_stations || []).filter((station) =>
            Number.isFinite(Number(station.latitude)) &&
            Number.isFinite(Number(station.longitude)),
          );
          setBaseStationMarkers(baseStations);
          setMowerMarkers(mowers);
          updateLiveStatus(mowers);
          if (mowers.length) {
            const firstMower = mowers[0];
            latInput.value = Number(firstMower.latitude).toFixed(7);
            lonInput.value = Number(firstMower.longitude).toFixed(7);
            if (fit && !hasAutoFit) {
              fitMapToVisibleData();
              hasAutoFit = true;
            }
            setStatus(
              mowers.length === 1
                ? "1 mower location loaded."
                : `${mowers.length} mower locations loaded.`,
            );
          } else {
            setStatus("No mower position returned yet.");
          }
          refresh();
          dirty = false;
        } catch (error) {
          setStatus(`Could not load Home Assistant state: ${error.message}`);
          setLiveStatus(`Update failed: ${error.message}`);
        } finally {
          isRefreshingHomeAssistantState = false;
        }
      }

      async function saveZonesToHomeAssistant() {
        const zones = buildZones();
        try {
          saveButton.disabled = true;
          setStatus("Saving zones...");
          const response = await fetch(zonesApiUrl(), {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ zones }),
          });
          if (!response.ok) {
            const text = await response.text();
            throw new Error(`${response.status} ${text}`);
          }
          const payload = await response.json();
          loadZones(payload.zones || zones);
          refresh();
          dirty = false;
          setStatus(`Saved ${payload.zones.length} zones to Home Assistant.`);
        } catch (error) {
          setStatus(`Save failed: ${error.message}`);
        } finally {
          saveButton.disabled = false;
        }
      }

      async function loadMowerLocation() {
        if (params.has("lat") && params.has("lon")) {
          setMowerMarkers([{ latitude: startLat, longitude: startLon, name: "Mower" }]);
          return;
        }

        try {
          const response = await fetch("mower_location.json", {
            cache: "no-store",
          });
          if (!response.ok) {
            return;
          }
          const location = await response.json();
          if (
            Number.isFinite(location.latitude) &&
            Number.isFinite(location.longitude)
          ) {
            latInput.value = Number(location.latitude).toFixed(7);
            lonInput.value = Number(location.longitude).toFixed(7);
            map.setView([location.latitude, location.longitude], 20);
            setMowerMarkers([location]);
          }
        } catch (error) {
          console.debug("No mower location available for auto-centering", error);
        }
      }

      function setMowerMarkers(mowers) {
        const seen = new Set();
        for (const mower of mowers) {
          const latitude = Number(mower.latitude);
          const longitude = Number(mower.longitude);
          if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
            continue;
          }
          const markerId = mower.id || mower.name || `${latitude},${longitude}`;
          seen.add(markerId);
          let marker = mowerMarkerById.get(markerId);
          if (!marker) {
            marker = L.marker([latitude, longitude], {
              icon: mowerDivIcon(mower),
            }).bindPopup(mowerPopup(mower));
            bindMowerLabel(marker, mower);
            mowerMarkerById.set(markerId, marker);
            mowerMarkers.addLayer(marker);
          } else {
            marker.setLatLng([latitude, longitude]);
            marker.setIcon(mowerDivIcon(mower));
            marker.setPopupContent(mowerPopup(mower));
            bindMowerLabel(marker, mower);
          }
        }
        for (const [markerId, marker] of mowerMarkerById.entries()) {
          if (seen.has(markerId)) {
            continue;
          }
          mowerMarkers.removeLayer(marker);
          mowerMarkerById.delete(markerId);
        }
      }

      function setBaseStationMarkers(baseStations) {
        const seen = new Set();
        for (const station of baseStations) {
          const latitude = Number(station.latitude);
          const longitude = Number(station.longitude);
          if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
            continue;
          }
          const markerId = station.id || station.name || `${latitude},${longitude}`;
          seen.add(markerId);
          let marker = baseStationMarkerById.get(markerId);
          if (!marker) {
            marker = L.marker([latitude, longitude], {
              icon: baseStationDivIcon(station),
            }).bindPopup(baseStationPopup(station));
            baseStationMarkerById.set(markerId, marker);
            baseStationMarkers.addLayer(marker);
          } else {
            marker.setLatLng([latitude, longitude]);
            marker.setIcon(baseStationDivIcon(station));
            marker.setPopupContent(baseStationPopup(station));
          }
        }
        for (const [markerId, marker] of baseStationMarkerById.entries()) {
          if (seen.has(markerId)) {
            continue;
          }
          baseStationMarkers.removeLayer(marker);
          baseStationMarkerById.delete(markerId);
        }
      }

      function updateLiveStatus(mowers) {
        const timestamp = new Date().toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
        });
        if (!mowers.length) {
          setLiveStatus(`Updated ${timestamp}: no mower coordinates`);
          return;
        }
        const mower = mowers[0];
        const latitude = Number(mower.latitude);
        const longitude = Number(mower.longitude);
        setLiveStatus(
          `Updated ${timestamp}: ${mowers.length} mower${mowers.length === 1 ? "" : "s"} · ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`,
        );
      }

      function setLiveStatus(message) {
        liveStatusText.textContent = message;
      }

      function setHeatmapMarkers(samples) {
        const validSamples = [];
        const boundsPoints = [];
        for (const sample of samples) {
          const latitude = Number(sample.latitude);
          const longitude = Number(sample.longitude);
          if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
            continue;
          }
          validSamples.push({
            latitude,
            longitude,
            value: sample.stuck ? -1 : 1,
            weight: 1,
          });
          boundsPoints.push([latitude, longitude]);
        }
        heatmapBounds = boundsPoints.length ? L.latLngBounds(boundsPoints) : null;
        heatmapLayer.setSamples(validSamples);
      }

      function signedEvidenceHeatmapLayer() {
        const layer = L.layerGroup();
        const minWeight = 0.05;
        const confidenceWeight = 5;
        const minAlpha = 45;
        const maxAlpha = 185;
        let canvas;
        let offscreen;
        let samples = [];

        layer.onAdd = function onAdd(targetMap) {
          canvas = L.DomUtil.create("canvas", "leaflet-layer heatmap-canvas");
          targetMap.getPanes().overlayPane.appendChild(canvas);
          targetMap.on("moveend zoomend resize", redraw);
          redraw();
        };

        layer.onRemove = function onRemove(targetMap) {
          targetMap.off("moveend zoomend resize", redraw);
          if (canvas?.parentNode) {
            canvas.parentNode.removeChild(canvas);
          }
          canvas = null;
        };

        layer.setSamples = function setSamples(nextSamples) {
          samples = nextSamples;
          redraw();
        };

        function redraw() {
          if (!canvas || !map) {
            return;
          }
          const size = map.getSize();
          const position = map.containerPointToLayerPoint([0, 0]);
          L.DomUtil.setPosition(canvas, position);
          canvas.style.width = `${size.x}px`;
          canvas.style.height = `${size.y}px`;

          const pixelRatio = window.devicePixelRatio || 1;
          canvas.width = Math.max(1, Math.round(size.x * pixelRatio));
          canvas.height = Math.max(1, Math.round(size.y * pixelRatio));
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          if (!samples.length) {
            return;
          }

          const scale = 0.28;
          const layerWidth = Math.max(1, Math.round(size.x * scale));
          const layerHeight = Math.max(1, Math.round(size.y * scale));
          offscreen = offscreen || document.createElement("canvas");
          offscreen.width = layerWidth;
          offscreen.height = layerHeight;

          const scoreSums = new Float32Array(layerWidth * layerHeight);
          const weightSums = new Float32Array(layerWidth * layerHeight);
          const sampleRadius = Math.max(6, Math.round((map.getZoom() >= 19 ? 24 : 20) * scale));

          for (const sample of samples) {
            const point = map.latLngToContainerPoint([sample.latitude, sample.longitude]);
            const centerX = Math.round(point.x * scale);
            const centerY = Math.round(point.y * scale);
            if (
              centerX < -sampleRadius ||
              centerX > layerWidth + sampleRadius ||
              centerY < -sampleRadius ||
              centerY > layerHeight + sampleRadius
            ) {
              continue;
            }
            for (let offsetY = -sampleRadius; offsetY <= sampleRadius; offsetY += 1) {
              const y = centerY + offsetY;
              if (y < 0 || y >= layerHeight) {
                continue;
              }
              for (let offsetX = -sampleRadius; offsetX <= sampleRadius; offsetX += 1) {
                const distanceSquared = offsetX * offsetX + offsetY * offsetY;
                if (distanceSquared > sampleRadius * sampleRadius) {
                  continue;
                }
                const x = centerX + offsetX;
                if (x < 0 || x >= layerWidth) {
                  continue;
                }
                const distance = Math.sqrt(distanceSquared) / sampleRadius;
                const spatialWeight = Math.max(0, 1 - distance * distance);
                const evidenceWeight = sample.weight * spatialWeight;
                const index = y * layerWidth + x;
                scoreSums[index] += sample.value * evidenceWeight;
                weightSums[index] += evidenceWeight;
              }
            }
          }

          const imageData = new ImageData(layerWidth, layerHeight);
          for (let index = 0; index < weightSums.length; index += 1) {
            const weightSum = weightSums[index];
            if (weightSum < minWeight) {
              continue;
            }
            const score = Math.max(-1, Math.min(1, scoreSums[index] / weightSum));
            const confidence = Math.min(1, weightSum / confidenceWeight);
            const [red, green, blue] = heatmapColor(score);
            const offset = index * 4;
            imageData.data[offset] = red;
            imageData.data[offset + 1] = green;
            imageData.data[offset + 2] = blue;
            imageData.data[offset + 3] = Math.round(minAlpha + confidence * (maxAlpha - minAlpha));
          }

          const offscreenCtx = offscreen.getContext("2d");
          offscreenCtx.putImageData(imageData, 0, 0);
          ctx.imageSmoothingEnabled = true;
          ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);
        }

        return layer;
      }

      function heatmapColor(score) {
        const red = [235, 38, 38];
        const yellow = [245, 191, 66];
        const green = [30, 180, 92];
        if (score < 0) {
          return interpolateColor(red, yellow, score + 1);
        }
        return interpolateColor(yellow, green, score);
      }

      function interpolateColor(start, end, ratio) {
        const clamped = Math.max(0, Math.min(1, ratio));
        return start.map((value, index) =>
          Math.round(value + (end[index] - value) * clamped),
        );
      }

      function loadZones(zones) {
        isLoading = true;
        drawnItems.clearLayers();
        zoneLabels.clearLayers();
        zoneCounter = 1;
        for (const zone of zones) {
          let layer;
          let labelPoint;
          if (Array.isArray(zone.center) && Number.isFinite(zone.radius_m)) {
            layer = L.circle(zone.center, {
              radius: zone.radius_m,
              ...zoneStyle(),
            });
            labelPoint = L.latLng(zone.center[0], zone.center[1]);
          } else if (Array.isArray(zone.polygon) && zone.polygon.length >= 3) {
            layer = L.polygon(zone.polygon, zoneStyle());
            labelPoint = polygonCenter(zone.polygon);
          }
          if (layer) {
            layer.zoneName = zone.name || `Zone ${zoneCounter}`;
            drawnItems.addLayer(layer);
            if (isReadonly && mapMode === "zones" && labelPoint) {
              layer.bindTooltip(escapeHtml(layer.zoneName), {
                permanent: true,
                direction: "center",
                className: "zone-label",
                opacity: 1,
              });
            }
            zoneCounter += 1;
          }
        }
        isLoading = false;
        updateZoneLabelSizes();
      }

      function setStatus(message) {
        statusText.textContent = message;
      }

      function markDirty() {
        if (isLoading) {
          return;
        }
        dirty = true;
        setStatus("Unsaved changes.");
      }

      function authHeaders() {
        try {
          const tokens = JSON.parse(localStorage.getItem("hassTokens") || "{}");
          const token = tokens.access_token;
          return token ? { Authorization: `Bearer ${token}` } : {};
        } catch (error) {
          return {};
        }
      }

      function zonesApiUrl({ cacheBust = false } = {}) {
        const url = new URL("/api/robot_mower_yard/zones", window.location.origin);
        if (yardEntryId) {
          url.searchParams.set("yard_entry_id", yardEntryId);
        }
        if (cacheBust) {
          url.searchParams.set("_", String(Date.now()));
        }
        return url.pathname + url.search;
      }

      function renderZoneList() {
        zoneList.replaceChildren();
        drawnItems.eachLayer((layer) => {
          const wrapper = document.createElement("div");
          wrapper.className = "zone-item";
          const label = document.createElement("label");
          label.textContent = "Zone name";
          const input = document.createElement("input");
          input.value = layer.zoneName || "";
          input.addEventListener("input", () => {
            layer.zoneName = input.value;
            markDirty();
            jsonOutput.value = JSON.stringify(buildZones(), null, 2);
          });
          label.appendChild(input);
          wrapper.appendChild(label);
          zoneList.appendChild(wrapper);
        });
      }

      function buildZones() {
        const zones = [];
        drawnItems.eachLayer((layer) => {
          const name = layer.zoneName || "Unnamed zone";
          if (layer instanceof L.Circle) {
            const center = layer.getLatLng();
            zones.push({
              name,
              center: [round(center.lat), round(center.lng)],
              radius_m: Math.round(layer.getRadius()),
            });
            return;
          }

          const latLngs = getOuterLatLngs(layer);
          if (!latLngs.length) {
            return;
          }
          zones.push({
            name,
            polygon: latLngs.map((point) => [round(point.lat), round(point.lng)]),
          });
        });
        return zones;
      }

      function getOuterLatLngs(layer) {
        if (layer instanceof L.Rectangle) {
          const bounds = layer.getBounds();
          const north = bounds.getNorth();
          const south = bounds.getSouth();
          const east = bounds.getEast();
          const west = bounds.getWest();
          return [
            L.latLng(north, west),
            L.latLng(north, east),
            L.latLng(south, east),
            L.latLng(south, west),
          ];
        }

        if (layer instanceof L.Polygon) {
          const latLngs = layer.getLatLngs();
          return Array.isArray(latLngs[0]) ? latLngs[0] : latLngs;
        }
        return [];
      }

      function round(value) {
        return Number(value.toFixed(7));
      }

      function zoneStyle() {
        return {
          color: "#256d4d",
          fillColor: "#4ba870",
          fillOpacity: 0.22,
          weight: 2,
        };
      }

      function polygonCenter(points) {
        const validPoints = points
          .filter((point) => Array.isArray(point) && point.length === 2)
          .map((point) => L.latLng(point[0], point[1]));
        if (!validPoints.length) {
          return null;
        }
        const bounds = L.latLngBounds(validPoints);
        return bounds.getCenter();
      }

      function updateZoneLabelSizes() {
        if (!isReadonly || mapMode !== "zones") {
          return;
        }
        const zoom = map.getZoom();
        const size = Math.max(13, Math.min(18, Math.round(zoom - 4)));
        document.documentElement.style.setProperty("--zone-label-size", `${size}px`);
      }

      function fitMapToVisibleData() {
        const groups = [];
        if (mapMode !== "heatmap" && drawnItems.getLayers().length) {
          groups.push(drawnItems);
        }
        if (mowerMarkers.getLayers().length) {
          groups.push(mowerMarkers);
        }
        if (baseStationMarkers.getLayers().length) {
          groups.push(baseStationMarkers);
        }
        if (heatmapBounds?.isValid()) {
          groups.push(L.featureGroup([L.rectangle(heatmapBounds, { opacity: 0, fillOpacity: 0 })]));
        }
        if (!groups.length) {
          return;
        }
        const bounds = L.featureGroup(groups).getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds.pad(0.2), { maxZoom: 20 });
        }
      }

      function mowerDivIcon(mower) {
        return L.divIcon({
          className: "",
          html: `<div class="mower-marker${mower.is_problem ? " problem" : ""}" aria-label="Mower">${mowerSvg()}</div>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -19],
        });
      }

      function bindMowerLabel(marker, mower) {
        marker.bindTooltip(escapeHtml(mower.name || mower.id || "Mower"), {
          permanent: true,
          direction: "top",
          offset: [0, -18],
          className: "mower-label",
          opacity: 1,
        });
      }

      function baseStationDivIcon(station) {
        return L.divIcon({
          className: "",
          html: `<div class="base-station-marker" aria-label="Base station">${baseStationSvg()}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          popupAnchor: [0, -16],
        });
      }

      function mowerPopup(mower) {
        const name = escapeHtml(mower.name || mower.id || "Mower");
        const provider = mower.provider ? `<br>Provider: ${escapeHtml(mower.provider)}` : "";
        const state = mower.state ? `<br>State: ${escapeHtml(mower.state)}` : "";
        const zone = mower.yard_zone ? `<br>Zone: ${escapeHtml(mower.yard_zone)}` : "";
        const source = mower.location_source === "base_station"
          ? "<br>Location: base station fallback"
          : "";
        return `<strong>${name}</strong>${provider}${state}${zone}${source}`;
      }

      function baseStationPopup(station) {
        const name = escapeHtml(station.name || "Navimow");
        return `<strong>${name} base station</strong><br>Provider: ${escapeHtml(station.provider || "navimow")}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function mowerSvg() {
        return `
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              fill="currentColor"
              d="M1 14V5H13C18.5 5 23 9.5 23 15V17H20.83C20.42 18.17 19.31 19 18 19C16.69 19 15.58 18.17 15.17 17H10C9.09 18.21 7.64 19 6 19C3.24 19 1 16.76 1 14M6 11C4.34 11 3 12.34 3 14C3 15.66 4.34 17 6 17C7.66 17 9 15.66 9 14C9 12.34 7.66 11 6 11M15 10V12H20.25C19.92 11.27 19.5 10.6 19 10H15Z"
            />
          </svg>
        `;
      }

      function baseStationSvg() {
        return `
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2L3 7V21H21V7L12 2M12 4.29L18.5 7.9V19H15V13H9V19H5.5V7.9L12 4.29M11 15H13V19H11V15Z"
            />
          </svg>
        `;
      }

      refresh();
    </script>
  </body>
</html>
