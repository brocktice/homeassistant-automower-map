set_blade_height:
  name: Set blade height
  description: Set the mower blade height when the provider supports it.
  fields:
    device_id:
      name: Device ID
      description: Provider mower identifier.
      required: true
      example: "1234567890"
      selector:
        text:
    height:
      name: Blade height
      description: Blade height in millimeters.
      required: true
      example: 30
      selector:
        number:
          min: 10
          max: 90
          step: 1
          mode: slider
